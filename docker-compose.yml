services:
  ml-service:
    build:
      context: .
      dockerfile: backend/Dockerfile.ml
    container_name: numberpredictor-ml
    restart: unless-stopped
    ports:
      - "8000:8000"

  showcase-app:
    build:
      context: .
      dockerfile: backend/Dockerfile.web
      args:
        VITE_API_BASE_URL: http://localhost:4000
        VITE_SOCKET_URL: http://localhost:4000
    container_name: numberpredictor-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHON_SERVICE_URL: http://ml-service:8000
    depends_on:
      - ml-service
    ports:
      - "4000:4000"
